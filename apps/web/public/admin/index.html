<!doctype html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex,nofollow" />
  <title>Quản trị Cổ Học</title>
  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="icon" href="/icons/app-icon.svg" type="image/svg+xml" />
  <style>
    :root{color-scheme:dark;--bg:#080503;--panel:rgba(22,15,8,.92);--soft:rgba(255,235,160,.045);--line:rgba(214,180,106,.34);--line2:rgba(214,180,106,.56);--gold:#d6b46a;--gold2:#f2d58d;--muted:#b9a47e;--text:#f4ead2;--danger:#ffb29d;--ok:#a8ecb1;--ink:#120b04}*{box-sizing:border-box}body{margin:0;min-height:100vh;background:radial-gradient(circle at 50% 0%,rgba(214,180,106,.17),transparent 34%),linear-gradient(180deg,#130d08 0%,var(--bg) 44%,#070402 100%);color:var(--text);font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}a{color:inherit;text-decoration:none}.shell{min-height:100vh;display:flex;flex-direction:column}.nav{position:sticky;top:0;z-index:10;height:56px;display:flex;align-items:center;justify-content:space-between;gap:18px;padding:0 28px;border-bottom:1px solid var(--line);background:rgba(8,5,3,.92);backdrop-filter:blur(14px)}.brand{display:inline-flex;align-items:center;gap:10px;color:var(--gold2);font-weight:850;letter-spacing:.04em}.brand img{width:30px;height:30px;border-radius:999px;border:1px solid var(--line)}.links{display:flex;align-items:center;gap:18px;color:var(--muted);font-size:14px}.links a:hover{color:var(--gold)}main{width:min(1040px,calc(100% - 32px));margin:0 auto;padding:48px 0 64px}.hero{text-align:center;margin-bottom:24px}.breadcrumb{color:var(--muted);font-size:13px;margin-bottom:16px}.breadcrumb span{color:var(--gold)}.icon{font-size:48px;opacity:.86;margin-bottom:12px}h1{margin:0 0 14px;color:var(--text);font-family:Georgia,ui-serif,serif;font-size:clamp(38px,6vw,70px);line-height:1.04}h2{margin:0 0 10px;color:var(--gold2);font-size:22px}h3{margin:0 0 7px;color:var(--gold);font-size:16px}p{color:var(--muted);line-height:1.7;margin:0}.card,.dash{border:1px solid var(--line);border-radius:22px;background:var(--panel);box-shadow:0 20px 54px rgba(0,0,0,.34),inset 0 1px 0 rgba(255,240,190,.06)}.card{padding:28px}.state{text-align:center;padding:34px 18px}.spinner{width:42px;height:42px;margin:0 auto 18px;border-radius:999px;border:3px solid rgba(214,180,106,.2);border-top-color:var(--gold);animation:spin .8s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}.state-icon{font-size:46px;margin-bottom:16px}.danger{color:var(--danger)}.badge{display:inline-flex;align-items:center;gap:8px;margin-top:14px;border:1px solid var(--line);border-radius:999px;padding:7px 12px;color:var(--gold2);background:rgba(214,180,106,.08);font-size:13px;font-weight:750}.dot{width:8px;height:8px;border-radius:999px;background:var(--gold);box-shadow:0 0 14px rgba(214,180,106,.78)}.actions{display:flex;flex-wrap:wrap;justify-content:center;gap:10px;margin-top:22px}.btn{display:inline-flex;align-items:center;justify-content:center;min-height:44px;border:1px solid var(--line2);border-radius:999px;padding:10px 18px;background:rgba(255,235,160,.06);color:var(--gold2);font:inherit;font-weight:800;cursor:pointer}.btn.primary{background:linear-gradient(180deg,#f1d58b,#9d6928);color:var(--ink);border-color:transparent}.grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:14px;margin-top:22px}.dash{padding:18px;min-height:130px}.metric{font-family:Georgia,ui-serif,serif;color:var(--gold2);font-size:32px;margin-top:10px}.panel{margin-top:16px;padding:22px;border:1px solid var(--line);border-radius:20px;background:var(--soft)}ul{display:grid;gap:8px;margin:12px 0 0;padding:0;list-style:none;color:var(--muted);line-height:1.6}code{color:var(--gold2);background:rgba(255,235,160,.07);padding:2px 6px;border-radius:6px}.footer{margin-top:auto;border-top:1px solid var(--line);color:var(--muted);text-align:center;padding:16px 22px;background:rgba(8,5,3,.82);font-size:13px}@media(max-width:780px){.nav{padding:0 14px}.links{gap:10px;font-size:13px}.grid{grid-template-columns:1fr}main{width:min(100% - 24px,1040px);padding:34px 0 46px}.card{padding:18px}.actions{flex-direction:column}.btn{width:100%}}
  </style>
</head>
<body>
  <div class="shell">
    <nav class="nav">
      <a class="brand" href="/"><img src="/icons/app-icon.svg" alt="" aria-hidden="true" /><span>Cổ Học</span></a>
      <div class="links"><a href="/account">Tài khoản</a><a href="/history">Lịch sử</a><a href="/">Trang chủ</a></div>
    </nav>
    <main>
      <section class="hero">
        <div class="breadcrumb"><a href="/">🏠</a> / <span>Quản trị</span></div>
        <div class="icon">🛡</div>
        <h1>Quản trị Cổ Học</h1>
        <p>Kiểm tra phiên Clerk và role trước khi mở dashboard. User thường không thấy dữ liệu quản trị.</p>
      </section>
      <section id="app" class="card" aria-live="polite"><div class="state"><div class="spinner" aria-hidden="true"></div><h2>Đang kiểm tra quyền quản trị</h2><p>Đang nạp Clerk và role hợp lệ.</p></div></section>
    </main>
    <footer class="footer">Cổ Học - Khu quản trị có kiểm soát.</footer>
  </div>
  <script>
    const ADMIN_ROLES = new Set(["super_admin", "admin", "operator", "reviewer"]);
    const app = document.getElementById("app");
    const safe = (v) => String(v ?? "").replace(/[&<>\"]/g, (c) => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[c]));
    function roleList(value, out = []) {
      if (!value) return out;
      if (typeof value === "string") { value.split(/[\s,]+/).filter(Boolean).forEach((x) => out.push(x)); return out; }
      if (Array.isArray(value)) { value.forEach((x) => roleList(x, out)); return out; }
      if (typeof value === "object") ["role", "roles", "adminRole", "admin_role", "org_role", "systemRole", "system_role"].forEach((k) => roleList(value[k], out));
      return out;
    }
    function readRoles(clerk) {
      const user = clerk?.user || {};
      const claims = clerk?.sessionClaims || clerk?.session?.claims || {};
      const memberships = user?.organizationMemberships || [];
      const all = [claims, claims?.public_metadata, claims?.publicMetadata, claims?.metadata, user?.publicMetadata, user?.unsafeMetadata, memberships, memberships.map?.((x) => x?.role)];
      return [...new Set(all.flatMap((x) => roleList(x)).map((x) => String(x).trim()).filter(Boolean))];
    }
    function adminRole(roles) { return roles.find((x) => ADMIN_ROLES.has(x)) || ""; }
    function email(user) { return user?.primaryEmailAddress?.emailAddress || user?.emailAddresses?.[0]?.emailAddress || ""; }
    function domainFromKey(key) {
      const encoded = String(key || "").replace(/^pk_(test|live)_/, "").trim();
      if (!encoded) return "clerk.hontho.com";
      try { const b64 = encoded.replace(/-/g,"+").replace(/_/g,"/"); return atob(b64.padEnd(b64.length + ((4 - b64.length % 4) % 4), "=")).replace(/\$$/, "") || "clerk.hontho.com"; } catch { return "clerk.hontho.com"; }
    }
    function loadScript(src, attrs = {}) {
      return new Promise((resolve, reject) => {
        const old = document.querySelector(`script[src="${src}"]`); if (old) return resolve();
        const s = document.createElement("script"); s.src = src; s.async = true; s.crossOrigin = "anonymous";
        Object.entries(attrs).forEach(([k,v]) => s.setAttribute(k,v)); s.onload = resolve; s.onerror = () => reject(new Error("Không tải được " + src)); document.head.appendChild(s);
      });
    }
    async function loadClerk() {
      const res = await fetch("/api/admin/public-config", { headers: { Accept: "application/json" } });
      if (!res.ok) throw new Error("Không nạp được public config Clerk.");
      const cfg = await res.json();
      const key = String(cfg?.clerkPublishableKey || "");
      if (!key) throw new Error("Thiếu cấu hình Clerk publishable key.");
      const d = domainFromKey(key);
      await loadScript(`https://${d}/npm/@clerk/ui@1/dist/ui.browser.js`);
      await loadScript(`https://${d}/npm/@clerk/clerk-js@6/dist/clerk.browser.js`, { "data-clerk-publishable-key": key });
      if (!window.Clerk) throw new Error("Không khởi tạo được Clerk.");
      if (typeof window.Clerk.load === "function") await window.Clerk.load({ publishableKey: key });
      return window.Clerk;
    }
    function login() { window.location.replace("/account?next=/admin"); }
    function denied(user, roles) {
      app.innerHTML = `<div class="state"><div class="state-icon">🚫</div><h2>Không có quyền quản trị</h2><p>Tài khoản <strong>${safe(email(user) || user?.id || "đang đăng nhập")}</strong> chưa có role quản trị hợp lệ.</p><p style="margin-top:10px">Role đọc được: ${roles.length ? roles.map(safe).join(", ") : "không có"}</p><div class="actions"><a class="btn primary" href="/account?next=/admin">Đổi tài khoản</a><a class="btn" href="/">Về trang chủ</a></div></div>`;
    }
    function errorView(message) {
      app.innerHTML = `<div class="state"><div class="state-icon">⚠️</div><h2>Chưa mở được trang quản trị</h2><p class="danger">${safe(message)}</p><div class="actions"><a class="btn primary" href="/account?next=/admin">Kiểm tra đăng nhập</a><a class="btn" href="/">Trang chủ</a></div></div>`;
    }
    function dashboard(user, role) {
      const name = user?.fullName || [user?.firstName, user?.lastName].filter(Boolean).join(" ") || email(user) || "Admin";
      app.classList.remove("card");
      app.innerHTML = `<section class="card"><div class="state" style="padding:18px"><div class="state-icon">✅</div><h2>Dashboard quản trị đã mở</h2><p>Xin chào <strong>${safe(name)}</strong>. Role hiện tại: <code>${safe(role)}</code>.</p><span class="badge"><span class="dot"></span> Phiên admin hợp lệ</span><div class="actions"><a class="btn primary" href="/account?next=/admin">Quản lý hồ sơ</a><button class="btn" id="out" type="button">Đăng xuất</button></div></div></section><section class="grid"><div class="dash"><h3>Apps & Agent</h3><p>Quản lý app, agent và binding.</p><div class="metric">🧩</div></div><div class="dash"><h3>Users / Quota</h3><p>Kiểm tra người dùng, role và tín dụng.</p><div class="metric">👥</div></div><div class="dash"><h3>Usage / Logs</h3><p>Theo dõi lượt gọi, lỗi và audit.</p><div class="metric">📜</div></div><div class="dash"><h3>System Config</h3><p>Cấu hình provider hệ thống.</p><div class="metric">⚙️</div></div></section><section class="panel"><h2>Chốt bảo mật đợt 2</h2><ul><li>✓ Chưa đăng nhập sẽ chuyển về <code>/account?next=/admin</code>.</li><li>✓ User thường chỉ thấy màn “Không có quyền quản trị”.</li><li>✓ Role hợp lệ: <code>super_admin</code>, <code>admin</code>, <code>operator</code>, <code>reviewer</code>.</li><li>✓ Không render dữ liệu quản trị trước khi role hợp lệ.</li></ul></section>`;
      document.getElementById("out")?.addEventListener("click", async () => { if (window.Clerk?.signOut) await window.Clerk.signOut(); login(); });
    }
    async function boot() {
      try {
        const clerk = await loadClerk();
        if (!clerk?.session || !clerk?.user) return login();
        const roles = readRoles(clerk);
        const role = adminRole(roles);
        if (!role) return denied(clerk.user, roles);
        dashboard(clerk.user, role);
      } catch (err) { errorView(err instanceof Error ? err.message : "Không kiểm tra được quyền quản trị."); }
    }
    void boot();
  </script>
</body>
</html>
