<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 1200" role="img" aria-labelledby="title desc">
  <title id="title">Đại Lục Nhâm</title>
  <desc id="desc">Minh họa Đại Lục Nhâm với thiên bàn, địa bàn, mười hai địa chi và Tam truyền.</desc>
  <defs>
    <radialGradient id="bg" cx="50%" cy="36%" r="76%">
      <stop offset="0" stop-color="#6b582f"/>
      <stop offset="0.48" stop-color="#2b2112"/>
      <stop offset="1" stop-color="#070403"/>
    </radialGradient>
    <linearGradient id="water" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#f4dfaa" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#f4dfaa" stop-opacity=".4"/>
      <stop offset="1" stop-color="#f4dfaa" stop-opacity="0"/>
    </linearGradient>
    <filter id="grain" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.78" numOctaves="3" seed="23"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer><feFuncA type="table" tableValues="0 0.14"/></feComponentTransfer>
    </filter>
    <filter id="glow"><feGaussianBlur stdDeviation="8"/></filter>
    <style><![CDATA[
      .ring{fill:none;stroke:#f1d995;stroke-opacity:.43;stroke-width:3}
      .strong{fill:none;stroke:#f5df9e;stroke-opacity:.68;stroke-width:4}
      .soft{fill:none;stroke:#f5df9e;stroke-opacity:.2;stroke-width:3}
      .text{font-family:"Noto Serif SC","Songti SC",serif;fill:#f5df9e;text-anchor:middle}
      .branch{font-size:32px;opacity:.92}
      .god{font-size:25px;opacity:.64}
    ]]></style>
  </defs>

  <rect width="900" height="1200" fill="url(#bg)"/>
  <rect width="900" height="1200" filter="url(#grain)" opacity="0.62"/>
  <path d="M70 865 C205 785 315 900 450 820 C590 738 694 846 830 770" class="soft" stroke-width="14"/>
  <path d="M80 950 C205 880 330 975 455 912 C595 842 704 926 825 862" stroke="url(#water)" fill="none" stroke-width="10" opacity=".62"/>
  <path d="M95 1027 C228 960 350 1060 490 986 C626 914 722 1000 812 944" class="soft" stroke-width="7"/>

  <g transform="translate(450 532)">
    <circle r="330" class="ring"/>
    <circle r="282" class="ring"/>
    <circle r="226" class="ring"/>
    <circle r="162" class="ring"/>
    <circle r="92" class="ring"/>
    <path d="M0 -330 V330 M-330 0 H330 M-286 -165 L286 165 M286 -165 L-286 165 M-165 -286 L165 286 M165 -286 L-165 286" class="ring" opacity=".85"/>

    <g class="text branch">
      <text x="0" y="-246">子</text><text x="123" y="-214">丑</text><text x="214" y="-123">寅</text><text x="246" y="11">卯</text>
      <text x="214" y="144">辰</text><text x="123" y="234">巳</text><text x="0" y="266">午</text><text x="-123" y="234">未</text>
      <text x="-214" y="144">申</text><text x="-246" y="11">酉</text><text x="-214" y="-123">戌</text><text x="-123" y="-214">亥</text>
    </g>
    <g class="text god">
      <text x="0" y="-296">貴</text><text x="148" y="-258">螣</text><text x="258" y="-148">朱</text><text x="296" y="8">六</text>
      <text x="258" y="166">勾</text><text x="148" y="276">青</text><text x="0" y="314">空</text><text x="-148" y="276">白</text>
      <text x="-258" y="166">常</text><text x="-296" y="8">玄</text><text x="-258" y="-148">陰</text><text x="-148" y="-258">后</text>
    </g>

    <g opacity=".58">
      <path d="M0 -198 L57 -78 L190 -60 L94 34 L116 166 L0 104 L-116 166 L-94 34 L-190 -60 L-57 -78 Z" fill="#0e0905"/>
      <path d="M0 -198 L57 -78 L190 -60 L94 34 L116 166 L0 104 L-116 166 L-94 34 L-190 -60 L-57 -78 Z" class="strong" opacity=".36"/>
    </g>

    <g opacity=".96">
      <circle r="63" fill="#e8c97a" opacity=".17" filter="url(#glow)"/>
      <circle r="38" fill="#e8c97a" opacity=".92"/>
      <circle r="13" fill="#0d0905"/>
      <text class="text" font-size="26" x="0" y="88">六壬</text>
    </g>
  </g>

  <g transform="translate(450 910)">
    <path d="M-210 0 C-125 -70 -65 -70 0 0 C65 70 125 70 210 0" fill="none" stroke="#e8c97a" stroke-opacity=".46" stroke-width="5"/>
    <g>
      <circle cx="-210" cy="0" r="48" fill="#110b05" stroke="#e8c97a" stroke-opacity=".56" stroke-width="3"/>
      <circle cx="0" cy="0" r="48" fill="#110b05" stroke="#e8c97a" stroke-opacity=".56" stroke-width="3"/>
      <circle cx="210" cy="0" r="48" fill="#110b05" stroke="#e8c97a" stroke-opacity=".56" stroke-width="3"/>
      <text class="text" font-size="32" x="-210" y="12">初</text>
      <text class="text" font-size="32" x="0" y="12">中</text>
      <text class="text" font-size="32" x="210" y="12">末</text>
    </g>
  </g>

  <g transform="translate(702 165)" opacity=".86">
    <rect x="-60" y="-60" width="120" height="120" rx="10" fill="none" stroke="#d0a84f" stroke-opacity=".5" stroke-width="4"/>
    <text class="text" font-size="34" x="0" y="-7">六</text>
    <text class="text" font-size="34" x="0" y="36">壬</text>
  </g>
  <circle cx="160" cy="160" r="4" fill="#f5df9e" opacity=".52"/>
  <circle cx="208" cy="250" r="3" fill="#f5df9e" opacity=".42"/>
  <circle cx="735" cy="430" r="4" fill="#f5df9e" opacity=".45"/>
  <circle cx="172" cy="710" r="3" fill="#f5df9e" opacity=".35"/>
</svg>
