<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 1200" role="img" aria-labelledby="title desc">
  <title id="title">Thái Ất Thần Số</title>
  <desc id="desc">Minh họa Thái Ất với thiên bàn, sao Bắc Đẩu, nhật nguyệt và trục thiên địa.</desc>
  <defs>
    <radialGradient id="bg" cx="50%" cy="32%" r="78%">
      <stop offset="0" stop-color="#775d2e"/>
      <stop offset="0.42" stop-color="#30200f"/>
      <stop offset="1" stop-color="#070403"/>
    </radialGradient>
    <radialGradient id="sun" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#f4d37a"/>
      <stop offset="0.72" stop-color="#d49a35"/>
      <stop offset="1" stop-color="#d49a35" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="beam" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#f5df9e" stop-opacity=".34"/>
      <stop offset="1" stop-color="#000" stop-opacity="0"/>
    </linearGradient>
    <filter id="blur"><feGaussianBlur stdDeviation="10"/></filter>
    <filter id="grain" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.72" numOctaves="3" seed="18"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer><feFuncA type="table" tableValues="0 0.13"/></feComponentTransfer>
    </filter>
    <style><![CDATA[
      .orbit{fill:none;stroke:#f1d995;stroke-opacity:.42;stroke-width:3}
      .axis{fill:none;stroke:#f5df9e;stroke-opacity:.55;stroke-width:3}
      .tick{stroke:#f5df9e;stroke-opacity:.48;stroke-width:4;stroke-linecap:round}
      .text{font-family:"Noto Serif SC","Songti SC",serif;fill:#f5df9e;text-anchor:middle}
    ]]></style>
  </defs>

  <rect width="900" height="1200" fill="url(#bg)"/>
  <rect width="900" height="1200" filter="url(#grain)" opacity="0.6"/>
  <path d="M180 95 C360 160 512 98 720 172 L720 0 H180 Z" fill="url(#beam)" opacity=".28"/>

  <circle cx="655" cy="245" r="120" fill="url(#sun)" filter="url(#blur)" opacity=".76"/>
  <circle cx="655" cy="245" r="66" fill="#d9a548" opacity=".95"/>
  <path d="M230 235 A96 96 0 1 0 230 420 A68 68 0 1 1 230 235" fill="#f1d995" opacity=".62"/>
  <path d="M242 245 A76 76 0 1 0 242 410 A54 54 0 1 1 242 245" fill="#140d06" opacity=".5"/>

  <g transform="translate(450 610)">
    <circle r="330" class="orbit"/>
    <circle r="282" class="orbit"/>
    <circle r="226" class="orbit"/>
    <circle r="164" class="orbit"/>
    <circle r="92" class="orbit"/>
    <path d="M0 -348 V348 M-348 0 H348" class="axis"/>
    <path d="M-246 -246 L246 246 M246 -246 L-246 246" class="axis" opacity=".5"/>

    <g>
      <line class="tick" x1="0" y1="-330" x2="0" y2="-304"/>
      <line class="tick" x1="85" y1="-319" x2="78" y2="-294"/>
      <line class="tick" x1="165" y1="-286" x2="152" y2="-264"/>
      <line class="tick" x1="233" y1="-233" x2="214" y2="-214"/>
      <line class="tick" x1="286" y1="-165" x2="264" y2="-152"/>
      <line class="tick" x1="319" y1="-85" x2="294" y2="-78"/>
      <line class="tick" x1="330" y1="0" x2="304" y2="0"/>
      <line class="tick" x1="319" y1="85" x2="294" y2="78"/>
      <line class="tick" x1="286" y1="165" x2="264" y2="152"/>
      <line class="tick" x1="233" y1="233" x2="214" y2="214"/>
      <line class="tick" x1="165" y1="286" x2="152" y2="264"/>
      <line class="tick" x1="85" y1="319" x2="78" y2="294"/>
      <line class="tick" x1="0" y1="330" x2="0" y2="304"/>
      <line class="tick" x1="-85" y1="319" x2="-78" y2="294"/>
      <line class="tick" x1="-165" y1="286" x2="-152" y2="264"/>
      <line class="tick" x1="-233" y1="233" x2="-214" y2="214"/>
      <line class="tick" x1="-286" y1="165" x2="-264" y2="152"/>
      <line class="tick" x1="-319" y1="85" x2="-294" y2="78"/>
      <line class="tick" x1="-330" y1="0" x2="-304" y2="0"/>
      <line class="tick" x1="-319" y1="-85" x2="-294" y2="-78"/>
      <line class="tick" x1="-286" y1="-165" x2="-264" y2="-152"/>
      <line class="tick" x1="-233" y1="-233" x2="-214" y2="-214"/>
      <line class="tick" x1="-165" y1="-286" x2="-152" y2="-264"/>
      <line class="tick" x1="-85" y1="-319" x2="-78" y2="-294"/>
    </g>

    <g fill="#f5df9e" opacity=".9">
      <circle cx="-115" cy="-86" r="8"/>
      <circle cx="-62" cy="-145" r="6"/>
      <circle cx="16" cy="-172" r="7"/>
      <circle cx="92" cy="-132" r="6"/>
      <circle cx="140" cy="-58" r="9"/>
      <circle cx="99" cy="22" r="6"/>
      <circle cx="22" cy="58" r="7"/>
      <path d="M-115 -86 L-62 -145 L16 -172 L92 -132 L140 -58 L99 22 L22 58" fill="none" stroke="#f5df9e" stroke-opacity=".54" stroke-width="3"/>
    </g>

    <g class="text" font-size="40" opacity=".95">
      <text x="0" y="-250">天</text><text x="250" y="12">人</text><text x="0" y="274">地</text><text x="-250" y="12">數</text>
    </g>
    <g>
      <circle r="64" fill="#e8c97a" opacity=".17" filter="url(#blur)"/>
      <circle r="36" fill="#e8c97a" opacity=".92"/>
      <text class="text" font-size="36" x="0" y="12" fill="#120c06">乙</text>
    </g>
  </g>

  <g transform="translate(690 862)" opacity=".86">
    <rect x="-60" y="-60" width="120" height="120" rx="60" fill="none" stroke="#d0a84f" stroke-opacity=".5" stroke-width="4"/>
    <text class="text" font-size="34" x="0" y="-7">太</text>
    <text class="text" font-size="34" x="0" y="36">乙</text>
  </g>
  <circle cx="135" cy="190" r="5" fill="#f5df9e" opacity=".75"/>
  <circle cx="760" cy="500" r="4" fill="#f5df9e" opacity=".58"/>
  <circle cx="160" cy="790" r="4" fill="#f5df9e" opacity=".48"/>
  <circle cx="742" cy="1010" r="3" fill="#f5df9e" opacity=".42"/>
</svg>
