<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 1200" role="img" aria-labelledby="title desc">
  <title id="title">Kỳ Môn Độn Giáp</title>
  <desc id="desc">Minh họa Kỳ Môn Độn Giáp với Cửu cung, tám môn và la bàn phương vị.</desc>
  <defs>
    <radialGradient id="bg" cx="50%" cy="34%" r="74%">
      <stop offset="0" stop-color="#6f572c"/>
      <stop offset="0.48" stop-color="#342210"/>
      <stop offset="1" stop-color="#080503"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="45%" r="42%">
      <stop offset="0" stop-color="#f0d58c" stop-opacity="0.34"/>
      <stop offset="0.62" stop-color="#d6b46a" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="gold" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f5df9e"/>
      <stop offset="0.52" stop-color="#d0a84f"/>
      <stop offset="1" stop-color="#7a541f"/>
    </linearGradient>
    <filter id="grain" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="3" seed="11"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.16"/>
      </feComponentTransfer>
    </filter>
    <filter id="softGlow"><feGaussianBlur stdDeviation="7"/></filter>
    <style><![CDATA[
      .thin{fill:none;stroke:#e8c97a;stroke-opacity:.46;stroke-width:3}
      .hair{fill:none;stroke:#f4dfaa;stroke-opacity:.24;stroke-width:2}
      .bright{fill:none;stroke:#f7df9b;stroke-opacity:.78;stroke-width:4}
      .text{font-family:"Noto Serif SC","Songti SC",serif;fill:#f5df9e;text-anchor:middle}
      .gate{font-size:34px;letter-spacing:.05em;opacity:.95}
      .branch{font-size:25px;opacity:.7}
    ]]></style>
  </defs>

  <rect width="900" height="1200" fill="url(#bg)"/>
  <rect width="900" height="1200" filter="url(#grain)" opacity="0.55"/>
  <rect width="900" height="1200" fill="url(#glow)"/>
  <path d="M0 0 H900 V230 C690 168 552 210 418 160 C270 105 150 172 0 118 Z" fill="#f0d58c" opacity="0.07"/>
  <path d="M120 1010 C250 940 355 1000 475 948 C590 898 725 930 820 850" class="hair" stroke-width="9"/>
  <path d="M98 1078 C235 1018 350 1086 492 1025 C642 960 742 1038 838 986" class="hair" stroke-width="5"/>

  <g transform="translate(450 560)">
    <circle r="325" class="hair"/>
    <circle r="282" class="thin"/>
    <circle r="218" class="hair"/>
    <circle r="138" class="hair"/>
    <path d="M0 -325 V325 M-325 0 H325 M-230 -230 L230 230 M230 -230 L-230 230" class="hair"/>
    <g fill="none" stroke="url(#gold)" stroke-width="5" stroke-linejoin="round" opacity=".86">
      <rect x="-198" y="-198" width="396" height="396" rx="10"/>
      <path d="M-66 -198 V198 M66 -198 V198 M-198 -66 H198 M-198 66 H198"/>
    </g>
    <g fill="#100a05" opacity=".28">
      <rect x="-198" y="-198" width="132" height="132"/>
      <rect x="66" y="-198" width="132" height="132"/>
      <rect x="-66" y="-66" width="132" height="132"/>
      <rect x="-198" y="66" width="132" height="132"/>
      <rect x="66" y="66" width="132" height="132"/>
    </g>
    <g class="text branch">
      <text x="0" y="-244">離</text><text x="244" y="9">震</text><text x="0" y="262">坎</text><text x="-244" y="9">兌</text>
      <text x="176" y="-176">巽</text><text x="176" y="190">艮</text><text x="-176" y="190">乾</text><text x="-176" y="-176">坤</text>
    </g>
    <g class="text gate">
      <text x="0" y="-108">景</text><text x="128" y="-108">杜</text><text x="128" y="18">傷</text>
      <text x="128" y="145">生</text><text x="0" y="145">休</text><text x="-128" y="145">開</text>
      <text x="-128" y="18">驚</text><text x="-128" y="-108">死</text>
    </g>
    <g opacity=".9">
      <path d="M-56 -18 H56 M-18 -56 V56" class="bright"/>
      <circle r="58" fill="#e8c97a" opacity=".2" filter="url(#softGlow)"/>
      <circle r="38" fill="#e8c97a" opacity=".9"/>
      <circle r="12" fill="#0d0905"/>
    </g>
    <path d="M-245 -282 C-158 -352 158 -352 245 -282" class="bright" opacity=".42"/>
    <path d="M-245 282 C-158 352 158 352 245 282" class="bright" opacity=".34"/>
  </g>

  <g transform="translate(690 160)">
    <rect x="-58" y="-58" width="116" height="116" rx="10" fill="none" stroke="#d0a84f" stroke-opacity=".45" stroke-width="4"/>
    <text class="text" font-size="34" x="0" y="-6">奇</text>
    <text class="text" font-size="34" x="0" y="36">門</text>
  </g>
</svg>
