<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#120d08" />
    <meta name="application-name" content="App Cổ Học" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Cổ Học" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="apple-touch-icon-precomposed" href="/apple-touch-icon.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/icon-512.png" />
    <title>Cổ Học iOS Install Test</title>
    <style>
      html, body {
        margin: 0;
        min-height: 100%;
        background: #120d08;
        color: #f4dfad;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      main {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        text-align: center;
      }
      .card {
        max-width: 520px;
        border: 1px solid rgba(244, 223, 173, 0.28);
        border-radius: 28px;
        padding: 28px;
        background: rgba(0, 0, 0, 0.24);
      }
      h1 { margin: 0 0 12px; font-size: 32px; }
      p { margin: 0; line-height: 1.6; color: #d5bd81; }
    </style>
  </head>
  <body>
    <main>
      <section class="card">
        <h1>Cổ Học iOS Test</h1>
        <p>Trang tối giản để kiểm tra Safari có tạo biểu tượng Home Screen hay không.</p>
      </section>
    </main>
  </body>
</html>
